name: palm_reader

description: Premium AI palm reading frontend
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^16.2.1
  google_fonts: ^6.3.0
  animations: ^2.0.11
  flutter_hooks: ^0.21.3+1
  http: ^1.2.2
  image: ^4.3.0
  image_picker: ^1.1.2
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
